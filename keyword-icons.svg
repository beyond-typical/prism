  <!-- flying = wing (authored) -->
  <symbol id="kw-flying" viewBox="-32 -32 64 64">
    <path fill="currentColor" d="M-24 2 Q-6 -18 24 -12 Q12 -7 14 -2 Q4 -5 4 3 Q-8 -1 -8 8 Q-18 7 -24 2 Z"/>
  </symbol>

  <!-- haste = lightning bolt (authored) -->
  <symbol id="kw-haste" viewBox="-32 -32 64 64">
    <path fill="currentColor" d="M6 -28 L-16 6 L-2 6 L-8 28 L20 -8 L4 -8 Z"/>
  </symbol>

  <!-- trample = footprint (authored) -->
  <symbol id="kw-trample" viewBox="-32 -32 64 64">
    <ellipse fill="currentColor" cx="0" cy="10" rx="11" ry="14"/>
    <circle fill="currentColor" cx="-9" cy="-6" r="4"/>
    <circle fill="currentColor" cx="-3" cy="-11" r="3.6"/>
    <circle fill="currentColor" cx="2.5" cy="-12" r="3.4"/>
    <circle fill="currentColor" cx="8" cy="-10" r="3"/>
    <circle fill="currentColor" cx="12.5" cy="-6" r="2.6"/>
