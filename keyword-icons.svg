  <!-- vigilance = eye (authored; evenodd punches iris, refills pupil) -->
  <symbol id="kw-vigilance" viewBox="-32 -32 64 64">
    <path fill="currentColor" fill-rule="evenodd" d="M-28 0 Q0 -17 28 0 Q0 17 -28 0 Z M12 0 A12 12 0 1 0 -12 0 A12 12 0 1 0 12 0 Z M5 0 A5 5 0 1 0 -5 0 A5 5 0 1 0 5 0 Z"/>
  </symbol>
</svg>
