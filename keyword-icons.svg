<svg xmlns="http://www.w3.org/2000/svg">
  <!--
    Keyword icon sprite. Referenced as <use href="/keyword-icons.svg#kw-<slug>"/>.
    All symbols share a centered viewBox so a single CSS size controls them, and
    every shape uses fill="currentColor" so the icon inherits the surrounding text
    colour (card frame cream / chip brown / etc.).

    reach/first_strike/deathtouch/lifelink/defender are Kenney "Board Game Icons"
    (CC0) silhouettes, recoloured. flying/trample/haste/vigilance are authored to
    match (Kenney's packs have no wing/boot/bolt/eye).
  -->

  <!-- reach = bow (Kenney) -->
  <symbol id="kw-reach" viewBox="-32 -32 64 64">
    <path fill="currentColor" d="M21.9 -11.2 L15.95 -8.2 Q21.75 0.7 21 16.25 20.9 18.3 19.4 19.7 17.85 21.1 15.75 21 13.7 20.9 12.3 19.4 11.55 18.55 11.25 17.6 L-5 12.15 -5 15 Q-5 15.85 -5.55 16.45 L-13.55 24.45 Q-14.15 25 -15 25 -15.85 25 -16.4 24.45 -17 23.85 -17 23 L-17 17 -23 17 Q-23.85 17 -24.4 16.45 -25 15.85 -25 15 -25 14.15 -24.4 13.6 L-16.4 5.6 Q-15.85 5 -15 5 L-12.15 5 -17.55 -11.2 Q-18.5 -11.55 -19.3 -12.25 -20.85 -13.6 -21 -15.65 -21.15 -17.75 -19.75 -19.3 -18.4 -20.85 -16.3 -21 -0.75 -21.95 8.25 -16 L11.2 -21.9 Q11.45 -22.4 11.95 -22.7 L13 -23 21 -23 Q21.85 -23 22.45 -22.4 23 -21.85 23 -21 L23 -13 22.7 -11.95 21.9 -11.2 M-0.5 7.35 L11.05 11.2 Q10.7 3.7 8.15 -1.3 L-0.5 7.35 M-7.35 0.5 L1.4 -8.2 Q-3.65 -10.9 -11.2 -11.1 L-7.35 0.5"/>
  </symbol>

  <!-- defender = shield (Kenney) -->
